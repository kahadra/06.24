<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="1990s real-time video surveillance problem framing">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#244b5a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#1f2d33" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1100" height="520" fill="#f6f2ea"/>
  <text x="56" y="58" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="30" font-weight="700" fill="#1d2b2f">왜 이 논문이 필요했나</text>
  <text x="56" y="92" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="17" fill="#4b5a60">실시간 감시 영상이 가능해졌지만, 배경은 더 이상 '한 장의 고정 이미지'가 아니었다.</text>

  <line x1="95" y1="255" x2="990" y2="255" stroke="#244b5a" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="215" height="150" rx="8" fill="#ffffff" stroke="#d6c8ad"/>
    <text x="92" y="185" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="18" font-weight="700" fill="#253339">비적응 배경</text>
    <text x="92" y="220" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#4b5a60">처음 배경을 저장</text>
    <text x="92" y="246" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#4b5a60">장면 변화에 취약</text>
    <text x="92" y="272" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#a64235">장기 운용 불가</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="150" width="215" height="150" rx="8" fill="#ffffff" stroke="#d6c8ad"/>
    <text x="352" y="185" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="18" font-weight="700" fill="#253339">평균 배경</text>
    <text x="352" y="220" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#4b5a60">시간 평균으로 적응</text>
    <text x="352" y="246" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#4b5a60">느린 물체, 반복 배경에 약함</text>
    <text x="352" y="272" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#a64235">배경이 번짐</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="150" width="215" height="150" rx="8" fill="#ffffff" stroke="#d6c8ad"/>
    <text x="612" y="185" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="18" font-weight="700" fill="#253339">단일 Gaussian</text>
    <text x="612" y="220" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#4b5a60">픽셀마다 평균과 분산</text>
    <text x="612" y="246" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#4b5a60">조명 변화는 일부 처리</text>
    <text x="612" y="272" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#a64235">여러 정상 상태는 설명 못함</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="850" y="130" width="215" height="190" rx="8" fill="#e8f1ef" stroke="#7aa398"/>
    <text x="872" y="168" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="18" font-weight="700" fill="#253339">이 논문의 전환</text>
    <text x="872" y="205" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#38545d">한 픽셀에 여러 배경 후보</text>
    <text x="872" y="232" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#38545d">자주 보이고 안정적인 값 = 배경</text>
    <text x="872" y="259" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#38545d">안 맞는 값 = 전경</text>
    <text x="872" y="286" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="15" fill="#2c6f63">실시간 online update</text>
  </g>

  <rect x="70" y="365" width="995" height="88" rx="8" fill="#1f2f35"/>
  <text x="95" y="399" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="18" font-weight="700" fill="#ffffff">문제 정의</text>
  <text x="95" y="430" font-family="Arial, 'Malgun Gothic', sans-serif" font-size="17" fill="#d9e8e4">고정 카메라의 매 프레임에서, 날씨·조명·반복 움직임이 있는 현실 배경을 계속 학습하면서 이동 객체만 안정적으로 분리한다.</text>
</svg>
